<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="default">
        <meta name="theme-color" content="#f2f2f7">
        
        <title>Conch</title>
        
        <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
        <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
        <link rel="manifest" href="/site.webmanifest">

        <meta property="og:title" content="Conch: Speak your secrets freely">
        <meta property="og:description" content="No storage, no network, no trace.">
        <meta property="og:image" content="/public/assets/og-card.png">
        <meta name="twitter:card" content="summary_large_image">
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300&display=swap" rel="stylesheet">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
        
        <link rel="stylesheet" href="./src/styles.css">
    </head>
    <body>
        <div class="bg" aria-hidden="true"></div>
        <canvas id="c" aria-hidden="true"></canvas>
    
        <main class="wrap">
            <div class="mark" aria-label="Conch">Conch</div>
        
            <textarea
              id="ta"
              placeholder="say anything…"
              maxlength="2000"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
              aria-label="Write anything. It will not be saved."
            ></textarea>
        
            <div class="meta">
                <span class="count" id="cnt" aria-live="polite" aria-label="character count"></span>
            </div>
        
            <div class="actions">
                <button id="btn" aria-label="Release — discard text permanently">Release</button>
            </div>
        </main>
    
        <p class="note" aria-hidden="true">Nothing is saved. Ever.</p>
    
        <script type="module" src="./src/main.js"></script>
    </body>
</html>
