<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="A place to let go of thoughts. Nothing is saved. Ever.">
        <title>Conch</title>
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="bg" aria-hidden="true"></div>
        <canvas id="c" aria-hidden="true"></canvas>
    
        <main class="wrap">
            <div class="mark" aria-label="Conch">Conch</div>
        
            <textarea
              id="ta"
              placeholder="say anything…"
              maxlength="2000"
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
              spellcheck="false"
              aria-label="Write anything. It will not be saved."
            ></textarea>
        
            <div class="meta">
                <span class="count" id="cnt" aria-live="polite" aria-label="character count"></span>
            </div>
        
            <div class="actions">
                <button id="btn" aria-label="Release — discard text permanently">Release</button>
            </div>
        </main>
    
        <p class="note" aria-hidden="true">Nothing is saved. Ever.</p>
    
        <script type="module" src="js/main.js"></script>
    </body>
</html>
